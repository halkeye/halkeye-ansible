---
- name: Install keychron
  block:
    # Copy udev rules for Keychron keyboard
    - name: Copy udev rules for keychron
      become: true
      ansible.builtin.copy:
        src: 99-keychron.rules
        dest: /etc/udev/rules.d/99-keychron.rules
        owner: root
        group: root
        mode: '0644'
      notify: reload udev rules

    # Add user to input group for Keychron keyboard access
    - name: Add user to input group for keychron access
      become: true
      ansible.builtin.user:
        name: '{{ env_user }}'
        groups: input
        append: true

    # Create desktop entry for Keychron Launcher
    - name: Create keychron desktop entry
      ansible.builtin.include_role:
        name: halkeye.desktop
      vars:
        desktop_files: "{{ keychron_desktop_files }}"
